<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Groupie Trackers</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: sans-serif;
            background: #0f0f0f;
            color: #f0f0f0;
            min-height: 100vh;
        }

        header {
            background: #1a1a1a;
            padding: 1.5rem 2rem;
            border-bottom: 1px solid #2a2a2a;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
        }

        header h1 { font-size: 1.5rem; letter-spacing: 0.05em; }
        header h1 span { color: #e8ff47; }

        .search-wrap { position: relative; }

        #search {
            background: #2a2a2a;
            border: 1px solid #3a3a3a;
            border-radius: 999px;
            padding: 0.5rem 1.2rem;
            color: #f0f0f0;
            font-size: 0.9rem;
            width: 280px;
            outline: none;
        }

        #search:focus { border-color: #e8ff47; }

        #results {
            position: absolute;
            top: calc(100% + 8px);
            left: 0;
            right: 0;
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            list-style: none;
            z-index: 100;
            overflow: hidden;
        }

        #results li a {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            padding: 0.6rem 1rem;
            text-decoration: none;
            color: #f0f0f0;
            transition: background 0.15s;
        }

        #results li a:hover { background: #2a2a2a; }

        #results li a img {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            object-fit: cover;
        }

        main { padding: 2rem; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1.2rem;
        }

        .card {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 10px;
            overflow: hidden;
            text-decoration: none;
            color: inherit;
            transition: transform 0.2s, border-color 0.2s;
            display: block;
        }

        .card:hover {
            transform: translateY(-4px);
            border-color: #e8ff47;
        }

        .card img {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
            display: block;
        }

        .card-body { padding: 0.8rem; }

        .card-body strong {
            display: block;
            font-size: 0.95rem;
            margin-bottom: 0.3rem;
        }

        .card-body span {
            font-size: 0.75rem;
            color: #e8ff47;
        }
    </style>
</head>
<body>

<header>
    <h1>Groupie <span>Trackers</span></h1>
    <div class="search-wrap">
        <input type="text" id="search" placeholder="Search artists or members..." />
        <ul id="results"></ul>
    </div>
</header>

<main>
    <div class="grid">
        {{ range .Artists }}
        <a class="card" href="/artist?id={{ .ID }}">
            <img src="{{ .Image }}" alt="{{ .Name }}">
            <div class="card-body">
                <strong>{{ .Name }}</strong>
                <span>Since {{ .CreationDate }}</span>
            </div>
        </a>
        {{ end }}
    </div>
</main>

<script>
    const input = document.getElementById('search');
    const results = document.getElementById('results');

    input.addEventListener('input', function() {
        const query = input.value.trim();
        if (!query) {
            results.innerHTML = '';
            return;
        }

        fetch('/search?q=' + encodeURIComponent(query))
            .then(r => r.json())
            .then(artists => {
                if (!artists || artists.length === 0) {
                    results.innerHTML = '<li><a href="#">No results</a></li>';
                    return;
                }
                results.innerHTML = artists.map(a =>
                    `<li>
                        <a href="/artist?id=${a.id}">
                            <img src="${a.image}" alt="${a.name}">
                            <strong>${a.name}</strong>
                        </a>
                    </li>`
                ).join('');
            });
    });
</script>

</body>
</html>
