<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Groupie Trackers</title>
</head>
<body>
    <h1>Groupie Trackers</h1>
    <ul>
        {{ range .Artists }}
        <li>
            <img src="{{ .Image }}" alt="{{ .Name }}" width="100">
            <strong>{{ .Name }}</strong> — since {{ .CreationDate }}
        </li>
        {{ end }}
    </ul>
</body>
</html>
